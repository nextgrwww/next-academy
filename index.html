        // ==========================================
        // AUTHENTICATION VIEW
        // ==========================================
        const AuthView = ({ onLogin, onRegister, isDarkMode, toggleDarkMode }) => {
            const [authTab, setAuthTab] = useState('login');
            const [authForm, setAuthForm] = useState({ username: '', password: '', name: '' });
            const [authError, setAuthError] = useState('');

            const handleAuthSubmit = (e) => {
                e.preventDefault();
                setAuthError('');
                
                if (authTab === 'register') {
                    const err = onRegister(authForm);
                    if (err) setAuthError(err);
                } else {
                    const err = onLogin(authForm.username, authForm.password);
                    if (err) setAuthError(err);
                }
            };

            return (
                <div className="min-h-screen bg-gray-50 dark:bg-gray-950 flex flex-col items-center justify-center p-4 transition-colors duration-300 relative">

                        <p className="opacity-90 font-medium text-sm leading-relaxed">

                        <button onClick={() => { setAuthTab('register'); setAuthError(''); }} className={`flex-1 py-2.5 rounded-lg font-bold text-sm transition-all ${authTab === 'register' ? 'bg-white dark:bg-gray-700 text-blue-600 dark:text-blue-400 shadow-sm' : 'text-gray-500 dark:text-gray-400'}`}>Create Account</button>

        // ==========================================
        // MAIN APPLICATION COMPONENT
        // ==========================================
        function App() {
          // --- USER MANAGEMENT & LOCAL STORAGE ---
          const loadUsers = () => {
            try {
              return JSON.parse(localStorage.getItem('next_academy_users')) || [];
            } catch (e) {
              return [];
            }
          };

          const loadActiveUser = () => {
            try {
              return localStorage.getItem('next_academy_active_user');
            } catch (e) {
              return null;
            }
          };

          const [users, setUsers] = useState(loadUsers);
          const [currentUsername, setCurrentUsername] = useState(loadActiveUser);
          
          const currentUser = users.find(u => u.username === currentUsername);

          // Application State
          // Possibilities: 'auth', 'home', 'course', 'lesson', 'profile', 'practice_home', 'practice_course', 'leaderboard'
          const [currentView, setCurrentView] = useState(currentUser ? 'home' : 'auth'); 
          const [activeCourseId, setActiveCourseId] = useState(null);
          const [activeLesson, setActiveLesson] = useState(null); // { moduleIdx, lessonIdx, data }
          const [lessonReturnView, setLessonReturnView] = useState('course'); // Where to go back when leaving a lesson
          
          // Theme state (Defaults to true/dark)
          const [isDarkMode, setIsDarkMode] = useState(() => {
            try {
              const savedTheme = localStorage.getItem('theme');
              return savedTheme === null ? true : savedTheme === 'dark';
            } catch (e) {
              return true;
            }
          });

          const [activePopup, setActivePopup] = useState(null); // 'streak', 'xp', or null
          
          // Derived State
          const activeCourse = COURSES_DATA.find(c => c.id === activeCourseId);

          // Safely save theme preference (avoiding file:// crashes)
          useEffect(() => {
            try {
              localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            } catch (e) {
              // Fail silently if localStorage is blocked
            }
          }, [isDarkMode]);

          const toggleDarkMode = () => setIsDarkMode(prev => !prev);

          // --- Authentication Handlers ---
          const handleRegister = (form) => {
            if (users.some(u => u.username.toLowerCase() === form.username.toLowerCase())) {
                return "Username already exists. Please choose another.";
            }
            const newUser = {
                username: form.username,
                password: form.password,
                name: form.name || form.username,
                stats: { xp: 0, streak: 1, completedLessons: [] }
            };
            const updatedUsers = [...users, newUser];
            setUsers(updatedUsers);
            
            try {
              localStorage.setItem('next_academy_users', JSON.stringify(updatedUsers));
              localStorage.setItem('next_academy_active_user', newUser.username);
            } catch(e) { console.warn("Local storage blocked."); }
            
            setCurrentUsername(newUser.username);
            setCurrentView('home');
            return null; // null means no error
          };

          const handleLogin = (username, password) => {
            const user = users.find(u => u.username.toLowerCase() === username.toLowerCase() && u.password === password);
            if (user) {
                setCurrentUsername(user.username);
                try {
                  localStorage.setItem('next_academy_active_user', user.username);
                } catch(e) { console.warn("Local storage blocked."); }
                setCurrentView('home');
                return null; // null means no error
            } else {
                return "Invalid username or password.";
            }
          };

          const handleLogout = () => {
            setCurrentUsername(null);
            try {
              localStorage.removeItem('next_academy_active_user');
            } catch(e) { console.warn("Local storage blocked."); }
            setCurrentView('auth');
          };

          const handleChangePassword = (currentPw, newPw) => {
            if (currentUser.password !== currentPw) {
                return "Incorrect current password.";
            }

                    }

                    return (
                      <div key={module.id} className="w-full border-b border-gray-200 dark:border-gray-800 md:border md:rounded-2xl md:shadow-sm md:bg-white md:dark:bg-gray-800 overflow-hidden">
                        {/* Accordion Header */}
                        <button 
                          onClick={() => toggleModule(mIdx)} 
                          className="w-full flex items-center justify-between p-4 md:p-5 bg-white dark:bg-gray-900 md:dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/80 transition-colors"
                        >
                          <div className="flex items-center gap-4">
                            <div className={`w-10 h-10 md:w-8 md:h-8 rounded-lg flex items-center justify-center shrink-0 ${iconColorClass}`}>
                              <ModuleIcon size={20} className="fill-current" strokeWidth={3} />
                            </div>
                            <span className="font-bold text-lg md:text-xl text-gray-800 dark:text-gray-100 text-left leading-tight">
                              {module.title}
                            </span>
                          </div>
                          {isExpanded ? (
                            <ChevronUp className="text-gray-400 shrink-0 ml-2" size={24} />
                          ) : (
                            <ChevronDown className="text-gray-400 shrink-0 ml-2" size={24} />
                          )}
                        </button>

                        {/* Accordion Body (Lessons) */}
                        {isExpanded && (
                          <div className="bg-gray-50 dark:bg-[#121212] md:dark:bg-gray-900/50 p-3 md:p-5 flex flex-col gap-3 md:gap-4 border-t border-gray-100 dark:border-gray-800">
                            {module.lessons.map((lesson, lIdx) => {
                              const completed = isLessonCompleted(lesson.id);
                              const unlocked = isLessonUnlocked(mIdx, lIdx);

                              return (
                                <button
                                  key={lesson.id}
                                  disabled={!unlocked}
                                  onClick={() => handleOpenLesson(mIdx, lIdx, lesson, 'course')}
                                  className={`w-full flex items-center justify-between p-4 rounded-xl border bg-white dark:bg-gray-800 text-left transition-all 
                                    ${unlocked 
                                      ? 'border-gray-200 dark:border-gray-700 hover:shadow-md hover:-translate-y-0.5 cursor-pointer' 
                                      : 'border-gray-100 dark:border-gray-800/50 opacity-60 cursor-not-allowed'
                                    }
                                  `}
                                >
                                  <div className="flex items-center gap-4">
                                    <div className="text-blue-500 shrink-0">
                                      {lesson.isModuleQuiz ? <Trophy size={28} /> : <FileText size={28} />}
                                    </div>
                                    <div>
                                      <p className="text-xs text-gray-400 dark:text-gray-500 uppercase font-bold tracking-wider mb-0.5">
                                        {lesson.isModuleQuiz ? 'Quiz' : 'Lesson'}
                                      </p>
                                      <p className="font-bold text-gray-800 dark:text-gray-100 text-base md:text-lg">
                                        {lesson.title}
                                      </p>
                                    </div>
                                  </div>
                                  <div className="shrink-0 ml-4 flex items-center justify-center">
                                    {completed ? (
                                      <Check className="text-green-500" size={28} strokeWidth={3} />
                                    ) : !unlocked ? (
                                      <Lock className="text-gray-300 dark:text-gray-600" size={20} />
                                    ) : null}
                                  </div>
                                </button>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          };

          const PracticeCoursePathView = () => {
            if (!activeCourse) return null;

            const [expandedModule, setExpandedModule] = useState(0); // Auto-expand first

            const toggleModule = (mIdx) => {
              setExpandedModule(prev => prev === mIdx ? null : mIdx);
            };

            return (
              <div className="pb-24 pt-6 px-0 md:px-8 max-w-3xl mx-auto flex flex-col items-center w-full animate-fade-in">
                <div className="text-center mb-8 px-4">
                  <h2 className="text-3xl font-extrabold text-gray-800 dark:text-gray-100 mb-2">{activeCourse.title} Practice</h2>
                  <p className="text-gray-500 dark:text-gray-400 font-medium">Direct access to chapter module quizzes</p>
                </div>

                <div className="w-full flex flex-col md:gap-4 border-t border-gray-200 dark:border-gray-800 md:border-t-0">
                  {activeCourse.modules.map((module, mIdx) => {
                    const isExpanded = expandedModule === mIdx;
                    
                    // Filter only Module Quizzes
                    const practiceLessons = module.lessons.filter(l => l.isModuleQuiz);

                    return (
                      <div key={module.id} className="w-full border-b border-gray-200 dark:border-gray-800 md:border md:rounded-2xl md:shadow-sm md:bg-white md:dark:bg-gray-800 overflow-hidden">
                        <button 
                          onClick={() => toggleModule(mIdx)} 
                          className="w-full flex items-center justify-between p-4 md:p-5 bg-white dark:bg-gray-900 md:dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/80 transition-colors"
                        >
                          <div className="flex items-center gap-4">
                            <div className={`w-10 h-10 md:w-8 md:h-8 rounded-lg flex items-center justify-center shrink-0 bg-orange-100 text-orange-500 dark:bg-orange-900/40 dark:text-orange-400`}>
                              <Trophy size={20} className="fill-current" strokeWidth={2} />
                            </div>
                            <span className="font-bold text-lg md:text-xl text-gray-800 dark:text-gray-100 text-left leading-tight">
                              {module.title}
                            </span>
                          </div>
                          {isExpanded ? <ChevronUp className="text-gray-400 shrink-0 ml-2" size={24} /> : <ChevronDown className="text-gray-400 shrink-0 ml-2" size={24} />}
                        </button>

                        {isExpanded && (
                          <div className="bg-gray-50 dark:bg-[#121212] md:dark:bg-gray-900/50 p-3 md:p-5 flex flex-col gap-3 md:gap-4 border-t border-gray-100 dark:border-gray-800">
                            {practiceLessons.length > 0 ? practiceLessons.map(lesson => {
                              // We need the original index to calculate unlocked state correctly
                              const originalLIdx = module.lessons.findIndex(l => l.id === lesson.id);
                              const completed = isLessonCompleted(lesson.id);
                              const unlocked = isLessonUnlocked(mIdx, originalLIdx);

                              return (
                                <button
                                  key={lesson.id}
                                  disabled={!unlocked}
                                  onClick={() => handleOpenLesson(mIdx, originalLIdx, lesson, 'practice_course')}
                                  className={`w-full flex items-center justify-between p-4 rounded-xl border bg-white dark:bg-gray-800 text-left transition-all 
                                    ${unlocked 
                                      ? 'border-gray-200 dark:border-gray-700 hover:shadow-md hover:-translate-y-0.5 cursor-pointer' 
                                      : 'border-gray-100 dark:border-gray-800/50 opacity-60 cursor-not-allowed'
                                    }
                                  `}
                                >
                                  <div className="flex items-center gap-4">
                                    <div className="text-orange-500 shrink-0">
                                      <Trophy size={28} />
                                    </div>
                                    <div>
                                      <p className="text-xs text-orange-400 dark:text-orange-500 uppercase font-bold tracking-wider mb-0.5">
                                        Practice Quiz
                                      </p>
                                      <p className="font-bold text-gray-800 dark:text-gray-100 text-base md:text-lg">
                                        {lesson.title}
                                      </p>
                                    </div>
                                  </div>
                                  <div className="shrink-0 ml-4 flex items-center justify-center">
                                    {completed ? (
                                      <Check className="text-green-500" size={28} strokeWidth={3} />
                                    ) : !unlocked ? (
                                      <Lock className="text-gray-300 dark:text-gray-600" size={20} />
                                    ) : null}
                                  </div>
                                </button>
                              );
                            }) : (
                              <p className="text-gray-500 p-2 text-center text-sm font-medium">No practice quizzes available for this module.</p>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          };

          const LessonInteractiveView = () => {
            if (!activeLesson) return null;
            const { data: lesson } = activeLesson;
            
            const [stepIdx, setStepIdx] = useState(0);
            const [currentAnswer, setCurrentAnswer] = useState(null);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [draggedIdx, setDraggedIdx] = useState(null);
            const [dragOverIdx, setDragOverIdx] = useState(null);
            
            const currentStep = lesson.steps[stepIdx];
            const isLastStep = stepIdx === lesson.steps.length - 1;

            // Initialize answer state when navigating to a new slide
            useEffect(() => {
              if (currentStep.type === 'rearrange') {
                setCurrentAnswer([...currentStep.items]);
              } else if (currentStep.type === 'fill_blank') {
                setCurrentAnswer("");
              } else {
                setCurrentAnswer(null);
              }
              setIsSubmitted(false);
              setDraggedIdx(null);
              setDragOverIdx(null);
            }, [stepIdx, currentStep]);

            // Evaluation Logic
            let isCorrect = false;
            if (currentStep.type === 'quiz') {
              isCorrect = currentAnswer === currentStep.correctOption;
            } else if (currentStep.type === 'fill_blank') {
              isCorrect = currentAnswer?.trim().toLowerCase() === currentStep.correctAnswer.toLowerCase();
            } else if (currentStep.type === 'rearrange') {
              isCorrect = JSON.stringify(currentAnswer) === JSON.stringify(currentStep.correctOrder);
            }

            const isActionDisabled = () => {
              if (currentStep.type === 'theory' || isSubmitted) return false;
              if (currentStep.type === 'quiz' && currentAnswer === null) return true;
              if (currentStep.type === 'fill_blank' && (!currentAnswer || currentAnswer.trim() === '')) return true;
              return false;
            };

            // Calculate progress up to current slide
            const progressPercent = (stepIdx / lesson.steps.length) * 100;

            const handleNext = () => {
              if (isLastStep) {
                const xpReward = lesson.steps.length * 10;
                handleCompleteLesson(lesson.id, xpReward);
              } else {
                setStepIdx(prev => prev + 1);
              }
            };

            const handleAction = () => {
              if (currentStep.type === 'theory') {
                handleNext();
              } else {
                if (!isSubmitted) {
                  setIsSubmitted(true);
                } else {
                  if (isCorrect) handleNext();
                  else {
                    // Reset for try again
                    setIsSubmitted(false);
                    if (currentStep.type === 'fill_blank') setCurrentAnswer("");
                    else if (currentStep.type === 'rearrange') setCurrentAnswer([...currentStep.items]);
                    else setCurrentAnswer(null);
                  }
                }
              }
            };

            // Keyboard support: Pressing 'Enter'
            const actionRef = useRef(handleAction);
            const disabledRef = useRef(isActionDisabled());

            useEffect(() => {
              actionRef.current = handleAction;
              disabledRef.current = isActionDisabled();
            });

            useEffect(() => {
              const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                  // Prevent double firing or unintended actions if focused on non-option buttons
                  if (e.target.tagName === 'BUTTON' && !e.target.classList.contains('option-btn')) return; 

                  if (!disabledRef.current) {
                    e.preventDefault();
                    actionRef.current();
                  }
                }
              };
              window.addEventListener('keydown', handleKeyDown);
              return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            // Render Helpers
            const renderQuiz = () => (
              <div className="flex flex-col gap-6 w-full animate-fade-in">
                <h3 className="text-xl font-bold text-gray-700 dark:text-gray-200">{currentStep.question}</h3>
                <div className="grid gap-3">
                  {currentStep.options.map((opt, idx) => {
                    let btnStateClass = "bg-white dark:bg-gray-800 border-2 border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700";
                    if (currentAnswer === idx) {
                      btnStateClass = `border-2 ${activeCourse.color.replace('bg-', 'border-')} ${activeCourse.lightBg} ${activeCourse.textColor} dark:bg-opacity-20`;
                    }
                    if (isSubmitted) {
                      if (idx === currentStep.correctOption) {
                         btnStateClass = "bg-green-100 dark:bg-green-900/40 border-2 border-green-500 text-green-700 dark:text-green-400";
                      } else if (idx === currentAnswer && !isCorrect) {
                         btnStateClass = "bg-red-100 dark:bg-red-900/40 border-2 border-red-500 text-red-700 dark:text-red-400";
                      } else {
                         btnStateClass = "bg-white dark:bg-gray-800 border-2 border-gray-200 dark:border-gray-700 text-gray-400 dark:text-gray-600 opacity-50";
                      }
                    }
                    return (
                      <button 
                        key={idx} disabled={isSubmitted} onClick={() => setCurrentAnswer(idx)}
                        className={`option-btn text-left font-bold text-lg p-4 rounded-2xl transition-all ${btnStateClass}`}
                      >
                        {opt}
                      </button>
                    );
                  })}
                </div>
              </div>
            );

            const renderFillBlank = () => (
              <div className="flex flex-col gap-6 w-full animate-fade-in">
                <h3 className="text-xl font-bold text-gray-700 dark:text-gray-200">{currentStep.question}</h3>
                <div className="flex flex-wrap items-center gap-3 text-xl font-bold text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-800 p-6 rounded-2xl border-2 border-gray-200 dark:border-gray-700">
                  {currentStep.textBefore && <span>{currentStep.textBefore}</span>}
                  <input
                    type="text"
                    disabled={isSubmitted}
                    value={currentAnswer || ''}
                    onChange={(e) => setCurrentAnswer(e.target.value)}
                    className={`w-32 border-b-4 outline-none text-center bg-transparent transition-colors pb-1 text-gray-800 dark:text-white
                      ${isSubmitted && isCorrect ? 'border-green-500 text-green-600 dark:text-green-400' :
                        isSubmitted && !isCorrect ? 'border-red-500 text-red-600 dark:text-red-400' :
                        'border-gray-400 dark:border-gray-500 focus:border-blue-500 text-blue-600 dark:focus:border-blue-400'}`}
                    autoFocus
                  />
                  {currentStep.textAfter && <span>{currentStep.textAfter}</span>}
                </div>
              </div>
            );

            const renderRearrange = () => (
              <div className="flex flex-col gap-5 w-full animate-fade-in relative">
                <h3 className="text-xl font-bold text-gray-700 dark:text-gray-200">{currentStep.question}</h3>
                <div 
                  className="flex flex-col gap-2 relative"
                  style={{ touchAction: draggedIdx !== null ? 'none' : 'auto' }} // Prevent scrolling while dragging on mobile
                  onMouseLeave={() => setDragOverIdx(null)}
                  onTouchCancel={() => { setDraggedIdx(null); setDragOverIdx(null); }}
                >
                  {currentAnswer?.map((item, idx) => {
                    let itemClass = "bg-white dark:bg-gray-800 border-2 border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300";
                    
                    if (isSubmitted) {
                      if (item === currentStep.correctOrder[idx]) itemClass = "bg-green-50 dark:bg-green-900/30 border-green-500 text-green-800 dark:text-green-400";
                      else itemClass = "bg-red-50 dark:bg-red-900/30 border-red-500 text-red-800 dark:text-red-400";
                    } else if (dragOverIdx === idx && draggedIdx !== idx) {
                      itemClass = "bg-blue-50 dark:bg-blue-900/30 border-blue-400 border-dashed text-blue-800 dark:text-blue-400";
                    }

                    return (
                      <div
                        key={item}
                        data-index={idx}
                        draggable={!isSubmitted}
                        
                        /* Desktop Mouse Drag Events */
                        onDragStart={(e) => {
                          setDraggedIdx(idx);
                          e.dataTransfer.effectAllowed = "move";
                          e.dataTransfer.setData("text/plain", idx);
                        }}
                        onDragOver={(e) => {
                          e.preventDefault();
                          if (draggedIdx !== null && dragOverIdx !== idx && draggedIdx !== idx) {
                            setDragOverIdx(idx);
                          }
                        }}
                        onDragLeave={() => {
                          if (dragOverIdx === idx) setDragOverIdx(null);
                        }}
                        onDragEnd={() => {
                          setDraggedIdx(null);
                          setDragOverIdx(null);
                        }}
                        onDrop={(e) => {
                          e.preventDefault();
                          if (draggedIdx === null) return;
                          const newItems = [...currentAnswer];
                          const draggedItem = newItems[draggedIdx];
                          newItems.splice(draggedIdx, 1);
                          newItems.splice(idx, 0, draggedItem);
                          setCurrentAnswer(newItems);
                          setDraggedIdx(null);
                          setDragOverIdx(null);
                        }}

                        /* Mobile Touch Drag Events */
                        onTouchStart={(e) => {
                          if (isSubmitted) return;
                          setDraggedIdx(idx);
                        }}
                        onTouchMove={(e) => {
                          if (isSubmitted || draggedIdx === null) return;
                          
                          // Find element under finger
                          const touch = e.touches[0];
                          const elem = document.elementFromPoint(touch.clientX, touch.clientY);
                          const target = elem?.closest('[data-index]');
                          
                          if (target) {
                            const targetIdx = parseInt(target.getAttribute('data-index'), 10);
                            if (!isNaN(targetIdx) && targetIdx !== dragOverIdx && targetIdx !== draggedIdx) {
                              setDragOverIdx(targetIdx);
                            }
                          }
                        }}
                        onTouchEnd={(e) => {
                          if (isSubmitted || draggedIdx === null) return;
                          if (dragOverIdx !== null && dragOverIdx !== draggedIdx) {
                            const newItems = [...currentAnswer];
                            const draggedItem = newItems[draggedIdx];
                            newItems.splice(draggedIdx, 1);
                            newItems.splice(dragOverIdx, 0, draggedItem);
                            setCurrentAnswer(newItems);
                          }
                          setDraggedIdx(null);
                          setDragOverIdx(null);
                        }}
                        className={`flex items-center gap-4 p-4 rounded-xl transition-all font-bold select-none
                          ${itemClass} 
                          ${draggedIdx === idx ? 'opacity-50 border-dashed' : 'cursor-move'} 
                          ${!isSubmitted && 'hover:bg-gray-50 dark:hover:bg-gray-700'}`}
                      >
                        <GripVertical size={20} className={isSubmitted ? "opacity-0" : "text-gray-400 dark:text-gray-500"} />
                        <span>{item}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            );

            return (
              <div className="fixed inset-0 bg-white dark:bg-gray-900 z-50 flex flex-col md:pl-0 transition-colors duration-300">
                {/* Progress header */}
                <div className="px-4 py-4 flex items-center gap-4 border-b border-gray-100 dark:border-gray-800">
                  <button onClick={() => setCurrentView(lessonReturnView)} className="text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 transition-colors">
                    <ChevronLeft size={32} />
                  </button>
                  <div className="flex-1 bg-gray-200 dark:bg-gray-700 h-3 rounded-full overflow-hidden">
                    <div 
                      className={`h-full ${activeCourse.color} transition-all duration-500`}
                      style={{ width: `${progressPercent}%` }}
                    ></div>
                  </div>
                </div>

                {/* Content Area */}
                <div className="flex-1 overflow-y-auto px-6 md:px-20 lg:px-40 py-8 max-w-4xl mx-auto w-full flex flex-col justify-center">
                  <h2 className="text-3xl font-extrabold text-gray-800 dark:text-gray-100 mb-8">
                    {lesson.isModuleQuiz ? "Module Quiz" : lesson.title}
                  </h2>
                  
                  {currentStep.type === 'theory' && (
                    <div className="bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl p-6 md:p-10 shadow-sm text-lg text-gray-700 dark:text-gray-300 leading-relaxed whitespace-pre-wrap">
                      {currentStep.content}
                    </div>
                  )}
                  {currentStep.type === 'quiz' && renderQuiz()}
                  {currentStep.type === 'fill_blank' && renderFillBlank()}
                  {currentStep.type === 'rearrange' && renderRearrange()}
                  
                </div>

                {/* Footer Action Area */}
                <div className={`border-t p-4 md:p-6 md:px-20 flex justify-center w-full transition-colors duration-300
                  ${isSubmitted && isCorrect ? 'bg-green-100 dark:bg-green-900/40 border-green-200 dark:border-green-800' : 
                    isSubmitted && !isCorrect ? 'bg-red-100 dark:bg-red-900/40 border-red-200 dark:border-red-800' : 'bg-white dark:bg-gray-900 border-gray-200 dark:border-gray-800'}`}>
                  <div className="max-w-4xl w-full flex flex-col md:flex-row items-center justify-between gap-4">
                    
                    <div className="hidden md:block">
                      {isSubmitted && isCorrect && <span className="text-xl font-extrabold text-green-600 dark:text-green-400 flex items-center gap-2"><Check size={32}/> Excellent!</span>}
                      {isSubmitted && !isCorrect && <span className="text-xl font-extrabold text-red-600 dark:text-red-400">Not quite right. Try again!</span>}
                    </div>

                    <button 
                      onClick={handleAction}
                      disabled={isActionDisabled()}
                      className={`w-full md:w-auto py-4 px-12 rounded-2xl font-extrabold text-lg text-white border-b-4 active:border-b-0 active:translate-y-1 transition-all
                        ${currentStep.type === 'theory' ? activeCourse.color + ' border-black/20 dark:border-black/40' : 
                          isSubmitted && isCorrect ? 'bg-green-500 border-green-600 dark:border-green-700' :
                          isSubmitted && !isCorrect ? 'bg-red-500 border-red-600 dark:border-red-700' :
                          !isActionDisabled() ? activeCourse.color + ' border-black/20 dark:border-black/40' :
                          'bg-gray-300 dark:bg-gray-700 border-gray-400 dark:border-gray-600 text-gray-500 dark:text-gray-400 cursor-not-allowed'
                        }
                      `}
                    >
                      {currentStep.type === 'theory' ? 'CONTINUE' : 
                       isSubmitted && isCorrect ? 'CONTINUE' :
                       isSubmitted && !isCorrect ? 'TRY AGAIN' : 'CHECK'}
                    </button>
                  </div>
                </div>
              </div>
            );
          };

          // ==========================================
          // DYNAMIC ROUTING (TopBar Back Actions)
          // ==========================================
          let backAction = null;
          if (currentView === 'course') backAction = () => setCurrentView('home');
          if (currentView === 'practice_course') backAction = () => setCurrentView('practice_home');

          // ==========================================
          // RENDER
          // ==========================================
          return (
            <div className={`${isDarkMode ? 'dark' : ''}`}>
              {currentView === 'auth' ? (
                <AuthView onLogin={handleLogin} onRegister={handleRegister} isDarkMode={isDarkMode} toggleDarkMode={toggleDarkMode} />
              ) : (
                <div className="min-h-screen bg-gray-50 dark:bg-gray-950 flex font-sans text-gray-800 dark:text-gray-100 transition-colors duration-300">
                  <Navigation />
                  
                  {/* Main Content Area */}
                  <main className="flex-1 md:ml-64 flex flex-col min-h-screen relative">
                    {currentView === 'home' && (
                      <>
                        <TopBar />
                        <HomeView />
                      </>
                    )}
                    
                    {currentView === 'course' && (
                      <>
                        <TopBar onBack={backAction} title={activeCourse?.title} />
                        <CoursePathView />
                      </>
                    )}

                    {currentView === 'practice_home' && (
                      <>
                        <TopBar title="Practice" />
                        <PracticeHomeView />
                      </>
                    )}

                    {currentView === 'practice_course' && (
                      <>
                        <TopBar onBack={backAction} title={`${activeCourse?.title} Practice`} />
                        <PracticeCoursePathView />
                      </>
                    )}

                    {currentView === 'leaderboard' && (
                      <>
                        <TopBar title="Leaderboard" />
                        <LeaderboardView />
                      </>
                    )}
                    
                    {currentView === 'profile' && (
                      <>
                        <TopBar title="Profile" />
                        <ProfileView />
                      </>
                    )}

                    {currentView === 'lesson' && <LessonInteractiveView />}
                  </main>
                </div>
              )}
            </div>
          );
        }

        // Initialize App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
